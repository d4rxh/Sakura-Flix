    <style>
      :root {
        color-scheme: dark;
        --brand: #f472b6;
        --brand-glow: rgba(244, 114, 182, 0.4);
        --plyr-color-main: #f472b6;
        --plyr-video-background: #000000;
        --plyr-menu-background: #110011;
        --plyr-menu-color: #f5d0fe;
        --plyr-tooltip-background: #110011;
        --plyr-tooltip-color: #f5d0fe;
        --plyr-control-icon-size: 18px;
        --plyr-control-spacing: 10px;
      }
      html {
        background-color: #0a0008;
        height: 100%;
      }
      body {
        background-color: #0a0008;
        color: #f5d0fe;
        font-family: 'Nunito', sans-serif;
        overflow-x: hidden;
        min-height: 100%;
        overscroll-behavior-y: none;
      }

      /* Sakura Scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #110011; }
      ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #ec4899; }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Sakura Petal Animations */
      @keyframes petalFall {
        0%   { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
        10%  { opacity: 0.8; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(100vh) rotate(720deg) translateX(60px); opacity: 0; }
      }
      .sakura-petal {
        position: fixed;
        pointer-events: none;
        z-index: 1;
        width: 8px;
        height: 8px;
        background: radial-gradient(circle at 30% 30%, #ffb3d4, #f472b6);
        border-radius: 150% 0 150% 0;
        animation: petalFall linear infinite;
        opacity: 0;
      }

      /* Loader */
      .loader {
        --color: #f472b6;
        --size: 60px;
        width: var(--size);
        height: var(--size);
        position: relative;
      }
      .loader::before, .loader::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }
      .loader::before {
        border-top-color: var(--color);
        animation: spin 1s linear infinite;
      }
      .loader::after {
        border-bottom-color: var(--color);
        animation: spin 0.8s linear infinite reverse;
        opacity: 0.5;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Skeleton Shimmer */
      @keyframes shimmer {
        0%   { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
      .skeleton-shimmer {
        background: #1a0018;
        background-image: linear-gradient(to right, #1a0018 0%, #300028 20%, #1a0018 40%, #1a0018 100%);
        background-repeat: no-repeat;
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite linear forwards;
      }

      /* Pink glow effect */
      .sakura-glow {
        box-shadow: 0 0 20px var(--brand-glow), 0 0 40px rgba(244,114,182,0.2);
      }
      .text-glow {
        text-shadow: 0 0 20px var(--brand-glow);
      }

      /* Landscape fix */
      @media (orientation: landscape) and (max-height: 500px) {
        .landscape-compact { padding-top: 0.5rem !important; }
        .landscape-hide { display: none !important; }
      }

      /* Plyr styles */
      .plyr { border-radius: 0; font-family: 'Nunito', sans-serif; }
      .plyr--video .plyr__controls {
        background: linear-gradient(rgba(0,0,0,0), rgba(10,0,8,0.9));
        padding-top: 30px;
      }
      .plyr__control--overlaid { background: rgba(244,114,182,0.8); }
      .plyr__control--overlaid:hover { background: #f472b6; }

      /* Sakura card hover */
      .sakura-card {
        transition: all 0.3s ease;
        border: 1px solid rgba(244,114,182,0.1);
      }
      .sakura-card:hover {
        border-color: rgba(244,114,182,0.4);
        box-shadow: 0 8px 30px rgba(244,114,182,0.15);
        transform: translateY(-2px);
      }

      /* Input focus pink */
      input:focus { outline: none; border-color: #f472b6 !important; }

      /* Bottom nav pill */
      .bottom-nav-pill {
        background: linear-gradient(135deg, #1a0018, #300028);
        border: 1px solid rgba(244,114,182,0.2);
        box-shadow: 0 8px 32px rgba(244,114,182,0.15), inset 0 1px 0 rgba(244,114,182,0.1);
      }
